<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>BMW ///M Racing | Highway Chase</title>
  <style>
    * {
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: linear-gradient(145deg, #0a1a1f, #051015);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', 'Poppins', 'Orbitron', monospace;
      margin: 0;
      padding: 20px;
    }

    .game-container {
      background: #000000aa;
      border-radius: 2rem;
      padding: 1rem;
      backdrop-filter: blur(4px);
      box-shadow: 0 20px 35px rgba(0,0,0,0.5);
      border: 1px solid #1e90ff55;
    }

    canvas {
      display: block;
      margin: 0 auto;
      border-radius: 1rem;
      box-shadow: 0 0 0 3px #1e90ff, 0 0 0 6px #0a3350;
      cursor: pointer;
      background-color: #131e24;
    }

    .dashboard {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 15px;
      margin-top: 18px;
      background: #031016cc;
      backdrop-filter: blur(12px);
      padding: 12px 20px;
      border-radius: 60px;
      border: 1px solid #1e90ff66;
    }

    .stats {
      display: flex;
      gap: 28px;
      font-weight: bold;
      font-family: monospace;
      letter-spacing: 1px;
    }

    .stat {
      background: #000000aa;
      padding: 6px 18px;
      border-radius: 40px;
      color: #ffd966;
      font-size: 1.3rem;
      font-weight: 800;
    }

    .stat span {
      color: #7ec8ff;
      font-size: 0.9rem;
      margin-right: 8px;
    }

    button {
      background: #1e90ff;
      border: none;
      padding: 8px 24px;
      border-radius: 60px;
      font-weight: bold;
      font-size: 1rem;
      font-family: inherit;
      cursor: pointer;
      transition: 0.2s;
      color: #011217;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    button:hover {
      background: #3ea5ff;
      transform: scale(0.96);
    }

    .controls-info {
      background: #05161eaa;
      padding: 6px 14px;
      border-radius: 40px;
      font-size: 0.75rem;
      color: #bbd4ff;
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
    }

    .brand {
      font-family: 'Orbitron', monospace;
      font-weight: 800;
      font-size: 1.2rem;
      background: linear-gradient(135deg, #ffffff, #4c9eff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    @media (max-width: 600px) {
      .stat { font-size: 1rem; padding: 4px 12px; }
      .stats { gap: 12px; }
      .dashboard { flex-direction: column; align-items: center; }
    }
  </style>
</head>
<body>
<div>
  <div class="game-container">
    <canvas id="gameCanvas" width="500" height="650"></canvas>
    <div class="dashboard">
      <div class="stats">
        <div class="stat"><span>🏁 SCORE</span> <span id="scoreValue">0</span></div>
        <div class="stat"><span>⛽ FUEL</span> <span id="fuelValue">100</span>%</div>
        <div class="stat"><span>🎯 BEST</span> <span id="bestValue">0</span></div>
      </div>
      <div class="controls-info">
        <span>◀  ▶  (A / D  or  ←  → )</span>
        <span>🚗 BMW M4 GT3</span>
      </div>
      <button id="resetGameBtn">🔄 RESTART RACE</button>
    </div>
    <div style="text-align: center; margin-top: 12px;">
      <span class="brand">🔥 BMW ///M POWER | DODGE TRAFFIC + COLLECT FUEL 🔥</span>
    </div>
  </div>
</div>

<script>
  (function(){
    // ---------- CANVAS ----------
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // Game dimensions
    const W = 500, H = 650;
    const LANE_COUNT = 3;
    const LANE_WIDTH = W / LANE_COUNT;  // ~166.66
    const CAR_WIDTH = 48;
    const CAR_HEIGHT = 72;
    
    // Player start position (middle lane)
    let player = {
      x: W/2 - CAR_WIDTH/2,
      y: H - 100,
      width: CAR_WIDTH,
      height: CAR_HEIGHT,
      lane: 1,        // 0=left, 1=mid, 2=right
    };

    // Obstacles (enemy cars) + fuel items
    let obstacles = [];
    let fuelItems = [];
    
    let score = 0;
    let fuel = 100;       // percentage, decreases over time
    let gameOver = false;
    let bestScore = localStorage.getItem('bmwBestScore') ? parseInt(localStorage.getItem('bmwBestScore')) : 0;
    
    // frame control
    let frame = 0;
    let obstacleSpawnCounter = 0;
    let fuelSpawnCounter = 0;
    
    // difficulty & speed
    let baseSpeed = 4.2;
    let currentSpeed = baseSpeed;
    
    // update UI elements
    const scoreSpan = document.getElementById('scoreValue');
    const fuelSpan = document.getElementById('fuelValue');
    const bestSpan = document.getElementById('bestValue');
    bestSpan.innerText = bestScore;
    
    // movement flags (keyboard)
    let leftPressed = false;
    let rightPressed = false;
    
    // ----- helper functions -----
    function updateUI() {
      scoreSpan.innerText = Math.floor(score);
      fuelSpan.innerText = Math.floor(fuel);
      if(score > bestScore) {
        bestScore = Math.floor(score);
        bestSpan.innerText = bestScore;
        localStorage.setItem('bmwBestScore', bestScore);
      }
    }
    
    // Collision (rect intersect)
    function rectCollide(r1, r2) {
      return !(r2.x > r1.x + r1.w ||
        r2.x + r2.w < r1.x ||
        r2.y > r1.y + r1.h ||
        r2.y + r2.h < r1.y);
    }
    
    // spawn enemy car (traffic)
    function spawnObstacle() {
      let lane = Math.floor(Math.random() * LANE_COUNT);
      let x = lane * LANE_WIDTH + (LANE_WIDTH/2) - CAR_WIDTH/2;
      // random enemy color (dark / sporty)
      const colors = ['#2c3e50', '#1f2a36', '#3e2a2a', '#16212b', '#2d4a5c'];
      obstacles.push({
        x: x,
        y: -CAR_HEIGHT,
        width: CAR_WIDTH,
        height: CAR_HEIGHT,
        lane: lane,
        color: colors[Math.floor(Math.random() * colors.length)]
      });
    }
    
    // spawn fuel canister (bonus)
    function spawnFuel() {
      let lane = Math.floor(Math.random() * LANE_COUNT);
      let x = lane * LANE_WIDTH + (LANE_WIDTH/2) - 20;  // fuel smaller
      fuelItems.push({
        x: x,
        y: -30,
        width: 28,
        height: 28,
        lane: lane,
        collected: false
      });
    }
    
    // reset game fully
    function resetGame() {
      gameOver = false;
      score = 0;
      fuel = 100;
      currentSpeed = baseSpeed;
      obstacles = [];
      fuelItems = [];
      frame = 0;
      obstacleSpawnCounter = 0;
      fuelSpawnCounter = 0;
      player.lane = 1;
      player.x = LANE_WIDTH * 1 + (LANE_WIDTH/2) - CAR_WIDTH/2;
      updateUI();
    }
    
    // update player lane from input
    function updatePlayerLane() {
      if(gameOver) return;
      let newLane = player.lane;
      if(leftPressed) newLane--;
      if(rightPressed) newLane++;
      if(newLane < 0) newLane = 0;
      if(newLane >= LANE_COUNT) newLane = LANE_COUNT-1;
      if(newLane !== player.lane) {
        player.lane = newLane;
        player.x = player.lane * LANE_WIDTH + (LANE_WIDTH/2) - CAR_WIDTH/2;
      }
    }
    
    // game logic update (moving objects, collisions, fuel consumption)
    function updateGame() {
      if(gameOver) return;
      
      // fuel consumption over time (0.15% per frame ~ 6% per sec at 60fps)
      fuel -= 0.12;
      if(fuel <= 0) {
        fuel = 0;
        gameOver = true;
      }
      
      // dynamic difficulty: speed increases with score
      currentSpeed = baseSpeed + Math.floor(score / 650) * 0.6;
      if(currentSpeed > 9) currentSpeed = 9;
      
      // --- spawn enemies (every ~45 frames, faster as score increases)
      let spawnRate = Math.max(28, 45 - Math.floor(score / 300));
      if(obstacleSpawnCounter <= 0) {
        spawnObstacle();
        obstacleSpawnCounter = spawnRate;
      } else {
        obstacleSpawnCounter--;
      }
      
      // spawn fuel (every ~110 frames, ensures not too many)
      if(fuelSpawnCounter <= 0 && fuelItems.length < 4) {
        spawnFuel();
        fuelSpawnCounter = 80 + Math.floor(Math.random() * 40);
      } else {
        fuelSpawnCounter--;
      }
      
      // move obstacles & collision
      for(let i=0; i<obstacles.length; i++) {
        const obs = obstacles[i];
        obs.y += currentSpeed;
        // collision with player
        if(rectCollide(
          {x: player.x, y: player.y, w: CAR_WIDTH, h: CAR_HEIGHT},
          {x: obs.x, y: obs.y, w: CAR_WIDTH, h: CAR_HEIGHT}
        )) {
          gameOver = true;
          break;
        }
        // remove if offscreen
        if(obs.y > H + 150) {
          obstacles.splice(i,1);
          i--;
        }
      }
      
      // fuel items collision & collection
      for(let i=0; i<fuelItems.length; i++) {
        const fuelItem = fuelItems[i];
        fuelItem.y += currentSpeed;
        // collision with player
        if(!fuelItem.collected && rectCollide(
          {x: player.x, y: player.y, w: CAR_WIDTH, h: CAR_HEIGHT},
          {x: fuelItem.x, y: fuelItem.y, w: fuelItem.width, h: fuelItem.height}
        )) {
          fuelItem.collected = true;
          fuel = Math.min(100, fuel + 18);
          score += 25;   // extra points for collecting fuel
          updateUI();
          fuelItems.splice(i,1);
          i--;
          continue;
        }
        // remove if offscreen
        if(fuelItem.y > H + 100) {
          fuelItems.splice(i,1);
          i--;
        }
      }
      
      // increase score over time (survival points)
      if(!gameOver) {
        score += 0.28;
        updateUI();
      }
      
      // cap fuel
      if(fuel > 100) fuel = 100;
      updateUI();
    }
    
    // ---------- DRAW EVERYTHING with SPORTS BMW STYLE ----------
    function drawRoad() {
      // asphalt
      ctx.fillStyle = '#171f23';
      ctx.fillRect(0, 0, W, H);
      // lane markings
      ctx.strokeStyle = '#ffe6a3';
      ctx.lineWidth = 5;
      for(let i=1; i<LANE_COUNT; i++) {
        ctx.beginPath();
        ctx.setLineDash([20, 30]);
        ctx.moveTo(i*LANE_WIDTH, 0);
        ctx.lineTo(i*LANE_WIDTH, H);
        ctx.stroke();
      }
      ctx.setLineDash([]);
      // road edges
      ctx.strokeStyle = '#1e90ff';
      ctx.lineWidth = 4;
      ctx.strokeRect(5, 0, W-10, H);
      // top glow
      ctx.fillStyle = '#08161ecc';
      ctx.fillRect(0,0,W,45);
    }
    
    function drawPlayerCar() {
      // BMW ///M inspired design
      const x = player.x, y = player.y;
      // body
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#1e40ff';
      ctx.beginPath();
      ctx.roundRect(x, y, CAR_WIDTH, CAR_HEIGHT, 12);
      ctx.fill();
      // carbon hood
      ctx.fillStyle = '#11151f';
      ctx.beginPath();
      ctx.roundRect(x+4, y+8, CAR_WIDTH-8, 26, 8);
      ctx.fill();
      // ///M stripes
      ctx.fillStyle = '#0066cc';
      ctx.fillRect(x+6, y+38, 8, 10);
      ctx.fillStyle = '#cc0000';
      ctx.fillRect(x+18, y+38, 8, 10);
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(x+30, y+38, 8, 10);
      // windows
      ctx.fillStyle = '#a9d6ff';
      ctx.beginPath();
      ctx.roundRect(x+6, y+12, CAR_WIDTH-12, 22, 6);
      ctx.fill();
      // headlights
      ctx.fillStyle = '#ffcc77';
      ctx.fillRect(x+4, y+CAR_HEIGHT-14, 10, 8);
      ctx.fillRect(x+CAR_WIDTH-14, y+CAR_HEIGHT-14, 10, 8);
      // BMW logo
      ctx.font = "bold 16px 'Segoe UI'";
      ctx.fillStyle = '#ffffff';
      ctx.shadowBlur = 0;
      ctx.fillText("///M", x+12, y+58);
    }
    
    function drawEnemyCar(obs) {
      const x = obs.x, y = obs.y;
      ctx.fillStyle = obs.color;
      ctx.beginPath();
      ctx.roundRect(x, y, CAR_WIDTH, CAR_HEIGHT, 12);
      ctx.fill();
      ctx.fillStyle = '#222d35';
      ctx.beginPath();
      ctx.roundRect(x+4, y+8, CAR_WIDTH-8, 28, 6);
      ctx.fill();
      ctx.fillStyle = '#ff4d4d';
      ctx.fillRect(x+10, y+48, 8, 8);
      ctx.fillRect(x+CAR_WIDTH-18, y+48, 8, 8);
      ctx.fillStyle = '#ffcc88';
      ctx.fillRect(x+5, y+CAR_HEIGHT-12, 8, 6);
      ctx.fillRect(x+CAR_WIDTH-13, y+CAR_HEIGHT-12, 8, 6);
    }
    
    function drawFuelItem(fuel) {
      ctx.fillStyle = '#f5b042';
      ctx.shadowBlur = 6;
      ctx.shadowColor = '#ffaa33';
      ctx.beginPath();
      ctx.rect(fuel.x, fuel.y, fuel.width, fuel.height);
      ctx.fill();
      ctx.fillStyle = '#d48f2b';
      ctx.beginPath();
      ctx.rect(fuel.x+6, fuel.y+6, 6, 16);
      ctx.fill();
      ctx.fillStyle = '#ffffff';
      ctx.font = "bold 15px monospace";
      ctx.fillText("⛽", fuel.x+8, fuel.y+22);
      ctx.shadowBlur = 0;
    }
    
    function drawGameOverlay() {
      if(!gameOver) return;
      ctx.globalAlpha = 0.85;
      ctx.fillStyle = '#010a0f';
      ctx.fillRect(0, 0, W, H);
      ctx.globalAlpha = 1;
      ctx.font = 'bold 38px "Segoe UI", system-ui';
      ctx.fillStyle = '#ffaa33';
      ctx.shadowBlur = 0;
      ctx.fillText("GAME OVER", W/2-120, H/2-45);
      ctx.font = '22px monospace';
      ctx.fillStyle = '#aaf0ff';
      ctx.fillText("BMW CRASH", W/2-75, H/2+15);
      ctx.font = '18px monospace';
      ctx.fillStyle = '#fcd48e';
      ctx.fillText("PRESS [RESTART] TO RACE AGAIN", W/2-165, H-90);
      ctx.font = "bold 16px monospace";
      ctx.fillStyle = '#7db9ff';
      ctx.fillText("///M POWER", W/2-55, H-45);
    }
    
    function drawHUDonCanvas() {
      // speedometer style
      ctx.font = "bold 14px 'Orbitron'";
      ctx.fillStyle = '#eef5ff';
      ctx.shadowBlur = 0;
      ctx.fillText(`⚡ ${Math.floor(currentSpeed*10)} km/h`, 20, 45);
      ctx.fillStyle = '#7dd3ff';
      ctx.fillText(`🏎️ BMW M4 GT3`, W-120, 45);
    }
    
    // roundRect helper
    if (!CanvasRenderingContext2D.prototype.roundRect) {
      CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
        if (w < 2 * r) r = w / 2;
        if (h < 2 * r) r = h / 2;
        this.moveTo(x+r, y);
        this.lineTo(x+w-r, y);
        this.quadraticCurveTo(x+w, y, x+w, y+r);
        this.lineTo(x+w, y+h-r);
        this.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
        this.lineTo(x+r, y+h);
        this.quadraticCurveTo(x, y+h, x, y+h-r);
        this.lineTo(x, y+r);
        this.quadraticCurveTo(x, y, x+r, y);
        return this;
      };
    }
    
    function draw() {
      drawRoad();
      // draw fuel items
      for(let f of fuelItems) drawFuelItem(f);
      // draw enemies
      for(let obs of obstacles) drawEnemyCar(obs);
      drawPlayerCar();
      drawHUDonCanvas();
      drawGameOverlay();
      // fuel bar on top-right
      ctx.fillStyle = '#2e4155';
      ctx.fillRect(W-120, 15, 100, 16);
      ctx.fillStyle = '#f2a65a';
      let fuelPercent = fuel/100;
      ctx.fillRect(W-120, 15, 100 * fuelPercent, 16);
      ctx.fillStyle = 'white';
      ctx.font = "bold 10px monospace";
      ctx.fillText("FUEL", W-118, 28);
    }
    
    // ----- GAME LOOP (requestAnimationFrame) -----
    let lastTimestamp = 0;
    function gameLoop() {
      if(!gameOver) {
        updatePlayerLane();
        updateGame();
      }
      draw();
      requestAnimationFrame(gameLoop);
    }
    
    // ----- EVENT HANDLERS (keyboard + touch / mobile arrows)-----
    function handleKeyDown(e) {
      const key = e.key;
      if(key === 'ArrowLeft' || key === 'a' || key === 'A') {
        leftPressed = true;
        e.preventDefault();
      } else if(key === 'ArrowRight' || key === 'd' || key === 'D') {
        rightPressed = true;
        e.preventDefault();
      }
      // optional restart with 'R' key
      if(key === 'r' || key === 'R') {
        resetGame();
        e.preventDefault();
      }
    }
    
    function handleKeyUp(e) {
      const key = e.key;
      if(key === 'ArrowLeft' || key === 'a' || key === 'A') {
        leftPressed = false;
        e.preventDefault();
      } else if(key === 'ArrowRight' || key === 'd' || key === 'D') {
        rightPressed = false;
        e.preventDefault();
      }
    }
    
    // mobile / touch support: simple touch buttons (create virtual)
    function setupMobileControls() {
      const container = document.querySelector('.dashboard');
      const touchDiv = document.createElement('div');
      touchDiv.style.display = 'flex';
      touchDiv.style.gap = '15px';
      touchDiv.style.marginTop = '8px';
      const leftBtn = document.createElement('button');
      leftBtn.innerText = '◀ LEFT';
      leftBtn.style.background = '#2c5670';
      const rightBtn = document.createElement('button');
      rightBtn.innerText = 'RIGHT ▶';
      rightBtn.style.background = '#2c5670';
      touchDiv.appendChild(leftBtn);
      touchDiv.appendChild(rightBtn);
      container.appendChild(touchDiv);
      
      leftBtn.addEventListener('mousedown', (e) => { leftPressed = true; e.preventDefault(); });
      leftBtn.addEventListener('mouseup', () => { leftPressed = false; });
      leftBtn.addEventListener('touchstart', (e) => { leftPressed = true; e.preventDefault(); });
      leftBtn.addEventListener('touchend', () => { leftPressed = false; });
      
      rightBtn.addEventListener('mousedown', (e) => { rightPressed = true; e.preventDefault(); });
      rightBtn.addEventListener('mouseup', () => { rightPressed = false; });
      rightBtn.addEventListener('touchstart', (e) => { rightPressed = true; e.preventDefault(); });
      rightBtn.addEventListener('touchend', () => { rightPressed = false; });
    }
    
    // initialize everything
    function init() {
      resetGame();
      window.addEventListener('keydown', handleKeyDown);
      window.addEventListener('keyup', handleKeyUp);
      document.getElementById('resetGameBtn').addEventListener('click', () => {
        resetGame();
      });
      setupMobileControls();
      // initial spawn of some objects to not feel empty
      for(let i=0;i<2;i++) spawnObstacle();
      for(let i=0;i<1;i++) spawnFuel();
      gameLoop();
    }
    
    init();
  })();
</script>
</body>
</html>
